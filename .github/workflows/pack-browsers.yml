name: Pack browser + desktop builds

on:
  push:
    branches: [main]
    paths:
      - "extension/**"
      - "scripts/pack-browsers.sh"
      - "desktop-inject/**"
      - ".github/workflows/pack-browsers.yml"
  workflow_dispatch:

jobs:
  pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Pack Chromium + Firefox zips
        run: bash scripts/pack-browsers.sh
      - name: Build Claude Desktop (Linux) inject kit
        run: |
          bash desktop-inject/build-bundle.sh
          zip -rq dist/claude-tracker-desktop-inject.zip desktop-inject
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: browser-and-desktop-packs
          path: dist/*.zip
